<body>
<header>
<h2>📱 Jual Beli HP Second</h2>
<p>Marketplace HP Second - Toko Siap Antar</p>
</header>

<div class="top">
<a class="btn" href="https://forms.gle/9G2KmNJ14a3jKpyK8" target="_blank">📝 Pasang Iklan</a>
<a class="btn" href="index.html">🏠 Kembali</a>
</div>

<input id="cari" placeholder="Cari tipe HP...">

<div id="list"></div>

<script>
const sheet="https://docs.google.com/spreadsheets/d/1H23wsTKmR1grQgSAqULbUCM9wQdfx5u6RHJwrrbROG0/gviz/tq?sheet=Produck%20member";

function drive(url){

if(!url) return "";

let id="";

if(url.includes("/file/d/")){
id=url.split("/file/d/")[1].split("/")[0];
}else if(url.includes("/d/")){
id=url.split("/d/")[1].split("/")[0];
}else if(url.includes("id=")){
id=url.split("id=")[1].split("&")[0];
}else{
return url;
}

return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000";
}

fetch(sheet).then(r=>r.text()).then(t=>{
 const j=JSON.parse(t.substring(47).slice(0,-2));
 const rows=j.table.rows;
 let out="";
 rows.forEach(r=>{

const c=r.c||[];

// Urutan sesuai Google Form
const nama = c[1]?.v || "";
const desk = c[2]?.v || "";
const harga = parseInt(c[3]?.v || 0);
const alamat = c[4]?.v || "";
const wa = (c[5]?.v || "").toString().replace(/^0/,"62");
const foto = drive(c[6]?.v || "");

out += `
<div class="card">

<img src="${foto}" onerror="this.src='logo2.png'">

<div class="info">

<h3>${nama}</h3>

<p>${desk}</p>

<p>📍 ${alamat}</p>

<div class="harga">
Rp ${harga.toLocaleString('id-ID')}
</div>

<a class="chat"
target="_blank"
href="https://wa.me/${wa}?text=${encodeURIComponent('Halo, saya tertarik dengan '+nama)}">
💬 Chat Penjual
</a>

</div>
</div>
`;
});

document.getElementById("list").innerHTML = out;
document.getElementById("cari").onkeyup=function(){
 const f=this.value.toLowerCase();
 document.querySelectorAll(".card").forEach(x=>{
   x.style.display=x.innerText.toLowerCase().includes(f)?"block":"none";
 });
}
</script>
</body>
</html>
