<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Jual Beli HP Second</title>
<style>
@media (max-width:768px){

#list{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
padding:6px;
}

.card{
background:#fff;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,.15);
overflow:hidden;
width:100%;
min-width:0;
}

.info{
padding:5px;
}

.info h3{
font-size:11px;
line-height:1.2;
margin:0 0 4px;
}

.info p{
font-size:9px;
margin:2px 0;
}

.harga{
font-size:11px;
margin:4px 0;
}

.chat{
font-size:10px;
padding:6px;
margin-top:5px;
border-radius:6px;
}

}
@media (max-width:768px){

#list{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
padding:6px;
}

.card{
background:#fff;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,.15);
overflow:hidden;
width:100%;
min-width:0;
}
.card img{
width:100%;
height:100px;
object-fit:cover;
}

}
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0}
header{background:#16a34a;color:#fff;padding:15px;text-align:center}
.top{display:flex;gap:10px;justify-content:center;padding:15px;flex-wrap:wrap}
a.btn{background:#ff9800;color:#fff;text-decoration:none;padding:10px 18px;border-radius:8px;font-weight:bold}
#cari{width:min(500px,95%);padding:10px;border:2px solid #16a34a;border-radius:8px;display:block;margin:0 auto 15px}
#list{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;padding:15px}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.15);overflow:hidden}
.card img{width:100%;height:200px;object-fit:cover}
.info{padding:12px}
.harga{color:#e65100;font-weight:bold}
.chat{display:block;background:#16a34a;color:#fff;text-align:center;text-decoration:none;padding:10px;margin-top:10px;border-radius:8px}
</style>
</head>
<body>
<header>
<h2>📱 Jual Beli HP Second</h2>
<p>Marketplace HP Second - Toko Siap Antar</p>
</header>

<div class="top">
<a class="btn" href="https://forms.gle/9G2KmNJ14a3jKpyK8" target="_blank">📝 Upload produck anda di sini</a>
<a class="btn" href="index.html">🏠 Kembali</a>
</div>

<input id="cari" placeholder="Cari tipe HP...">

<div id="list"></div>

<script>
const sheet="https://docs.google.com/spreadsheets/d/1H23wsTKmR1grQgSAqULbUCM9wQdfx5u6RHJwrrbROG0/gviz/tq?sheet=Produck%20member";

function drive(url){

if(!url) return "";

let id="";

if(url.includes("/file/d/")){
id=url.split("/file/d/")[1].split("/")[0];
}else if(url.includes("/d/")){
id=url.split("/d/")[1].split("/")[0];
}else if(url.includes("id=")){
id=url.split("id=")[1].split("&")[0];
}else{
return url;
}

return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000";
}

fetch(sheet).then(r=>r.text()).then(t=>{
 const j=JSON.parse(t.substring(47).slice(0,-2));
 const rows=j.table.rows;
 let out="";
 rows.forEach(r=>{

const c=r.c||[];

// Urutan sesuai Google Form
const nama = c[1]?.v || "";
const desk = c[2]?.v || "";
const harga = parseInt(c[3]?.v || 0);
const alamat = c[4]?.v || "";
const wa = (c[5]?.v || "").toString().replace(/^0/,"62");
const foto = drive(c[6]?.v || "");

out += `
<div class="card">

<img src="${foto}" onerror="this.src='logo2.png'">

<div class="info">

<h3>${nama}</h3>

<p>${desk}</p>

<p>📍 ${alamat}</p>

<div class="harga">
Rp ${harga.toLocaleString('id-ID')}
</div>

<a class="chat"
target="_blank"
href="https://wa.me/${wa}?text=${encodeURIComponent('Halo, saya tertarik dengan '+nama)}">
💬 Chat Penjual
</a>

</div>

</div>`;
});
 document.getElementById("list").innerHTML=out;
});

document.getElementById("cari").onkeyup=function(){
 const f=this.value.toLowerCase();
 document.querySelectorAll(".card").forEach(x=>{
   x.style.display=x.innerText.toLowerCase().includes(f)?"block":"none";
 });
}
</script>
</body>
</html>
