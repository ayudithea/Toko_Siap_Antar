<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kartu Produk A YUDI THEA</title>
<style>
body{font-family:Segoe UI,sans-serif;background:#f4f6f9;padding:20px}
.produk-card{max-width:320px;margin:auto;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.produk-card img{width:100%;height:220px;object-fit:cover}
.info{padding:12px}
.nama{font-weight:bold;font-size:18px}
.desc{color:#666;margin:6px 0}
.view{font-size:13px;color:#666}
.rating{color:#f59e0b;margin:6px 0}
.harga{font-size:22px;color:#ff6a00;font-weight:bold;margin:8px 0}
.btn{display:block;width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;color:#fff;font-weight:bold}
.chat{background:#25D366}
.cart{background:#16a34a}
.buy{background:#ff7a00}
</style>
</head>
<body>
<div class="produk-card">
<img src="https://via.placeholder.com/320x220?text=FOTO+PRODUK">
<div class="info">
<div class="nama">LCD OPPO A38</div>
<div class="desc">Original Shinestar</div>
<div class="view">👁 1.245 Dilihat</div>
<div class="rating">⭐⭐⭐⭐⭐</div>
<div class="harga">Rp165.000</div>
<button class="btn chat">💬 Chat</button>
<button class="btn cart">🛒 Keranjang</button>
<button class="btn buy">🟧 Beli Sekarang</button>
</div>
</div>
</body>
</html>
