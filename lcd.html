<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LCD MEMBER</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0}
header{background:#ff9800;color:#fff;padding:12px;text-align:center;font-weight:bold;position:sticky;top:0}
#search{width:95%;margin:10px auto;display:block;padding:10px;border-radius:8px;border:1px solid #ccc}
.az{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;padding:6px}
.az a{padding:4px 7px;background:#fff;border-radius:4px;text-decoration:none;color:#333;font-size:12px}
.item{background:#fff;margin:8px;padding:10px;border-radius:8px;border-bottom:1px solid #ddd}
.name{font-weight:bold}
.price{color:#e53935;margin:4px 0}
.qty{display:flex;align-items:center;gap:6px;margin:6px 0}
.qty button{width:30px;height:30px}
.qty input{width:45px;text-align:center}
.btns{display:flex;gap:6px;flex-wrap:wrap}
.btn{flex:1;padding:8px;border:none;border-radius:6px;color:#fff;font-weight:bold;cursor:pointer}
.cart{background:#ff9800}
.buy{background:#2196f3}
.wa{background:#25d366;text-decoration:none;text-align:center;line-height:34px}
</style>
</head>
<body>
<header>DAFTAR LCD MEMBER</header>

<input id="search" placeholder="Cari produk..." onkeyup="filterProduk()">

<div class="az" id="az"></div>

<div id="list"></div>

<script>
const SHEET_URL="https://opensheet.elk.sh/1H23wsTKmR1grQgSAqULbUCM9wQdfx5u6RHJwrrbROG0/MEMBER";
let data=[];

fetch(SHEET_URL)
.then(r=>r.json())
.then(d=>{
 data=d;
 tampil(data);
});

function tampil(arr){
 let h="";
 let huruf={};
 arr.forEach((p,i)=>{
   const nama=(p.Nama||p.nama||p.PRODUK||p.Produk||"").trim();
   const harga=p.Harga||p.harga||"";
   if(!nama) return;
   const aw=nama.charAt(0).toUpperCase();
   if(!huruf[aw]) huruf[aw]=i;
   h+=`<div class="item" id="p${i}">
<div class="name">${nama}</div>
<div class="price">Rp ${harga}</div>
<div class="qty">
<button onclick="ubah(this,-1)">-</button>
<input class="q" value="1">
<button onclick="ubah(this,1)">+</button>
</div>
<div class="btns">
<button class="btn cart" onclick="alert('Tambahkan ke sistem keranjang Anda')">🛒 Keranjang</button>
<button class="btn buy" onclick="alert('Hubungkan ke checkout Anda')">🛍️ Beli</button>
<a class="btn wa" target="_blank" href="https://wa.me/6282319264646?text=Halo%20saya%20ingin%20bertanya%20tentang%20${encodeURIComponent(nama)}">💬 WA</a>
</div>
</div>`;
 });
 document.getElementById("list").innerHTML=h;
 let az="";
 Object.keys(huruf).sort().forEach(k=>{
   az+=`<a href="#p${huruf[k]}">${k}</a>`;
 });
 document.getElementById("az").innerHTML=az;
}

function ubah(el,n){
 let q=el.parentElement.querySelector(".q");
 let v=parseInt(q.value)||1;
 v+=n;
 if(v<1)v=1;
 q.value=v;
}

function filterProduk(){
 let k=document.getElementById("search").value.toLowerCase();
 tampil(data.filter(x=>{
 let n=(x.Nama||x.nama||x.PRODUK||x.Produk||"").toLowerCase();
 return n.includes(k);
 }));
}
</script>
</body>
</html>
