<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daftar LCD Member</title>
<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{position:sticky;top:0;background:#16a34a;color:#fff;padding:14px;text-align:center;font-weight:bold;font-size:20px}
#search{width:94%;margin:10px auto;display:block;padding:12px;border:2px solid #16a34a;border-radius:8px}
.az{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;padding:6px}
.az a{text-decoration:none;background:#fff;padding:5px 8px;border-radius:4px;color:#333;font-size:12px}
.item{background:#fff;margin:8px;padding:10px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,.12)}
.name{font-weight:bold}
.price{color:#f97316;font-weight:bold;margin:6px 0}
.qty{display:flex;align-items:center;gap:8px;margin:8px 0}
.qty button{width:34px;height:34px}
.qty input{width:45px;text-align:center}
.btns{display:flex;gap:5px;flex-wrap:wrap}
.btn{flex:1;padding:9px;border:none;border-radius:6px;color:#fff;font-weight:bold;cursor:pointer}
.cart{background:#16a34a}.buy{background:#ff9800}.wa{background:#25d366;text-decoration:none;text-align:center;line-height:36px}
</style>
</head>
<body>
<header>DAFTAR LCD MEMBER</header>
<input id="search" placeholder="Cari LCD..." onkeyup="filterProduk()">
<div class="az" id="az"></div>
<div id="list">Memuat data...</div>

<script>
const url="https://docs.google.com/spreadsheets/d/1H23wsTKmR1grQgSAqULbUCM9wQdfx5u6RHJwrrbROG0/gviz/tq?sheet=MEMBER";
let data=[];

fetch(url).then(r=>r.text()).then(t=>{
 const j=JSON.parse(t.substring(47).slice(0,-2));
 data=[];
 j.table.rows.forEach(r=>{
   if(!r.c)return;
   data.push({
     nama:r.c[1]?.v||"",
     harga:r.c[3]?.v||0
   });
 });
 tampil(data);
}).catch(()=>{
 document.getElementById("list").innerHTML="<center>Data tidak dapat dimuat.<br>Pastikan sheet MEMBER dapat diakses.</center>";
});

function tampil(arr){
 let h="",ab={};
 arr.forEach((p,i)=>{
  if(!p.nama)return;
  let a=p.nama[0].toUpperCase();
  if(ab[a]==null)ab[a]=i;
  h+=`<div class="item" id="p${i}">
<div class="name">${p.nama}</div>
<div class="price">Rp ${Number(p.harga).toLocaleString("id-ID")}</div>
<div class="qty">
<button onclick="qty(this,-1)">-</button>
<input value="1" class="q" readonly>
<button onclick="qty(this,1)">+</button>
</div>
<div class="btns">
<button class="btn cart" onclick="alert('Hubungkan ke fungsi tambahKeranjang() dari index.html')">🛒 Keranjang</button>
<button class="btn buy" onclick="alert('Hubungkan ke fungsi beliSekarang() dari index.html')">🛍️ Beli</button>
<a class="btn wa" target="_blank" href="https://wa.me/6282319264646?text=${encodeURIComponent('Halo Admin, saya ingin bertanya tentang '+p.nama)}">💬 WA</a>
</div></div>`;
 });
 document.getElementById("list").innerHTML=h;
 let s="";
 Object.keys(ab).sort().forEach(k=>s+=`<a href="#p${ab[k]}">${k}</a>`);
 document.getElementById("az").innerHTML=s;
}
function qty(b,n){let q=b.parentNode.querySelector(".q");let v=parseInt(q.value)+n;if(v<1)v=1;q.value=v;}
function filterProduk(){
 const k=document.getElementById("search").value.toLowerCase();
 tampil(data.filter(x=>x.nama.toLowerCase().includes(k)));
}
</script>
</body>
</html>
