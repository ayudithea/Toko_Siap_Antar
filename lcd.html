<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daftar LCD Member</title>
<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
position:sticky;
top:0;
background:#16a34a;
color:#fff;
padding:14px;
text-align:center;
font-weight:bold;
font-size:20px;
}

#search{
width:94%;
margin:10px auto;
display:block;
padding:12px;
border:2px solid #16a34a;
border-radius:8px;
}

.az{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:4px;
padding:6px;
}

.az a{
text-decoration:none;
background:#fff;
padding:5px 8px;
border-radius:4px;
color:#333;
font-size:12px;
}

.item{
background:#fff;
margin:8px;
padding:10px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.name{
font-weight:bold;
font-size:18px;
}

.price{
color:#f97316;
font-weight:bold;
margin:8px 0;
font-size:18px;
}

.qty{
display:flex;
align-items:center;
gap:8px;
margin:10px 0;
}

.qty button{
width:40px;
height:40px;
font-size:22px;
border-radius:8px;
}

.qty input{
width:55px;
text-align:center;
font-size:18px;
}

.btns{
display:flex;
gap:10px;
align-items:center;
margin-top:10px;
}

.btn{
border:none;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:5px;
text-decoration:none;
font-weight:bold;
transition:.2s;
box-shadow:
0 7px 0 rgba(0,0,0,.35),
0 12px 18px rgba(0,0,0,.18);
}

.btn:active{
transform:translateY(5px);
box-shadow:
0 2px 0 rgba(0,0,0,.35),
0 4px 8px rgba(0,0,0,.18);
}

/* Keranjang */
.cart{
width:80px;
height:70px;
background:#fff;
color:#222;
border-radius:18px;
font-size:14px;
flex-direction:column;
}

/* WA */
.wa{
width:80px;
height:70px;
background:#fff;
color:#222;
border-radius:18px;
font-size:14px;
flex-direction:column;
line-height:normal;
}

/* Beli */
.buy{
flex:1;
height:70px;
background:linear-gradient(90deg,#ff9800,#ff4d00);
color:#fff;
border-radius:18px;
font-size:22px;
}

/* Keranjang Melayang */
#cartFloat{
position:fixed;
right:15px;
bottom:20px;
background:linear-gradient(90deg,#00c853,#ff9800);
color:#fff;
padding:14px 22px;
border-radius:50px;
font-size:22px;
font-weight:bold;
border:3px solid #ffd600;
box-shadow:
0 8px 0 rgba(0,0,0,.35),
0 15px 25px rgba(0,0,0,.25);
cursor:pointer;
z-index:99999;
transition:.2s;
}

#cartFloat:active{
transform:translateY(5px);
box-shadow:
0 2px 0 rgba(0,0,0,.35),
0 5px 10px rgba(0,0,0,.25);
}

#cartCount{
background:#ff9800;
padding:4px 9px;
border-radius:50%;
font-size:14px;
margin-left:6px;
font-weight:bold;
}
</style>
</head>
<body>
<div id="cartFloat" onclick="window.location.href='cart.html'">
🛒 Keranjang <span id="cartCount">0</span>
</div>
<header>DAFTAR LCD MEMBER</header>
<input id="search" placeholder="Cari LCD..." onkeyup="filterProduk()">
<div class="az" id="az"></div>
<div id="list">Memuat data...</div>

<script>
const url="https://docs.google.com/spreadsheets/d/1H23wsTKmR1grQgSAqULbUCM9wQdfx5u6RHJwrrbROG0/gviz/tq?sheet=MEMBER";
let data=[];

fetch(url).then(r=>r.text()).then(t=>{

 const j=JSON.parse(t.substring(47).slice(0,-2));

 data=[];

 j.table.rows.forEach(r=>{
   if(!r.c)return;

   data.push({
     nama:r.c[1]?.v||"",
     harga:r.c[5]?.v||0
   });

 });

 // Urutkan dari harga termurah ke termahal
 data.sort(function(a,b){
     return Number(a.harga||0) - Number(b.harga||0);
 });

 tampil(data);

}).catch(()=>{

 document.getElementById("list").innerHTML=
 "<center>Data tidak dapat dimuat.<br>Pastikan sheet MEMBER dapat diakses.</center>";

});

function tampil(arr){
 let h="",ab={};
 arr.forEach((p,i)=>{
  if(!p.nama)return;
  let a=p.nama[0].toUpperCase();
  if(ab[a]==null)ab[a]=i;
  h+=`<div class="item" id="p${i}">
<div class="name">${p.nama}</div>
<div class="price">Rp ${Math.round(Number(p.harga)).toLocaleString("id-ID")}</div>
<div class="qty">
<button onclick="qty(this,-1)">-</button>
<input value="1" class="q" readonly>
<button onclick="qty(this,1)">+</button>
</div>
<div class="btns">
<button class="btn cart"
onclick="simpanKeKeranjang('${p.nama}',${p.harga},this)">
🛒 Keranjang
</button>
<a class="btn wa" target="_blank" href="https://wa.me/6282319264646?text=${encodeURIComponent('Halo Admin, saya ingin bertanya tentang '+p.nama)}">💬 WA</a>
</div></div>`;
 });
<button class="btn buy"
onclick="beliSekarang('${p.nama}',${p.harga},this)">
🛍️ Beli
</button>

 document.getElementById("list").innerHTML=h;
 let s="";
 Object.keys(ab).sort().forEach(k=>s+=`<a href="#p${ab[k]}">${k}</a>`);
 document.getElementById("az").innerHTML=s;
}
function qty(b,n){let q=b.parentNode.querySelector(".q");let v=parseInt(q.value)+n;if(v<1)v=1;q.value=v;}
function filterProduk(){
 const k=document.getElementById("search").value.toLowerCase();
 tampil(data.filter(x=>x.nama.toLowerCase().includes(k)));
}

function simpanKeKeranjang(nama,harga,btn){

let qty=parseInt(
btn.parentElement.parentElement.querySelector(".q").value
);

let popup=document.createElement("div");

popup.style.cssText=`
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
`;

popup.innerHTML=`
<div style="
background:#fff;
width:90%;
max-width:340px;
padding:20px;
border-radius:15px;
text-align:center">

<h3 style="color:#16a34a">
TOKO SIAP ANTAR
</h3>

<p style="margin:18px 0">
Produk akan ditambahkan ke keranjang.
</p>

<div style="display:flex;gap:10px">

<button id="btnBatal"
style="
flex:1;
padding:12px;
border:none;
background:#999;
color:#fff;
border-radius:8px;">
Batal
</button>

<button id="btnOk"
style="
flex:1;
padding:12px;
border:none;
background:#16a34a;
color:#fff;
border-radius:8px;">
OK
</button>

</div>

</div>
`;

document.body.appendChild(popup);

document.getElementById("btnBatal").onclick=function(){
popup.remove();
};

document.getElementById("btnOk").onclick=function(){

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let i=cart.findIndex(x=>x.nama===nama);

if(i>=0){

cart[i].qty+=qty;

}else{

cart.push({
nama:nama,
harga:Number(harga),
qty:qty,
foto:""
});

}

localStorage.setItem("cart",JSON.stringify(cart));

popup.innerHTML=`
<div style="
background:#fff;
width:90%;
max-width:340px;
padding:20px;
border-radius:15px;
text-align:center">

<h3 style="color:#16a34a">
TOKO SIAP ANTAR
</h3>

<p style="margin:18px 0">
✅ Produk berhasil ditambahkan ke Keranjang.
</p>

<button onclick="this.closest('div').parentElement.remove()"
style="
width:100%;
padding:12px;
border:none;
background:#16a34a;
color:#fff;
border-radius:8px;
font-weight:bold;">
OK
</button>

</div>
`;
};

}
function beliSekarang(nama,harga,btn){

    let qty=parseInt(
        btn.parentElement.parentElement.querySelector(".q").value
    );

    let cart=JSON.parse(localStorage.getItem("cart")) || [];

    let i=cart.findIndex(x=>x.nama===nama);

    if(i>=0){
        cart[i].qty+=qty;
    }else{
        cart.push({
            nama:nama,
            harga:Number(harga),
            qty:qty,
            foto:""
        });
    }

    localStorage.setItem("cart",JSON.stringify(cart));

    window.location.href="cart.html";

}
function updateCartCount(){

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let total=0;

cart.forEach(item=>{
total+=item.qty;
});

document.getElementById("cartCount").innerText=total;

}

updateCartCount();
</script>
</body>

</html>
